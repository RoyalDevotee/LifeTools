    <style>

        .nav-link {

        .nav-link:hover {

        .search-box {

        .search-input {

            display: flex;
            align-items: center;

            max-width: 600px;

            display: flex;

            gap: 8px;
            transition: background-color var(--transition-speed) ease, transform var(--transition-speed) ease;

        /* 工具卡片高對比區塊 */

            background-color: var(--bg-card-section);
            border-top: 1px solid rgba(255, 140, 0, 0.1);

            max-width: 1200px;

            color: var(--text-dark);

            content: '';

            width: 6px;
            height: 24px;

            border-radius: 3px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            animation: fadeInUp 1s ease-out;
        }

        /* 工具小卡樣式 */
        .tool-card {
            background-color: var(--white);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            transition: all var(--transition-speed) cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(255, 140, 0, 0.12);
            border-color: rgba(255, 140, 0, 0.2);

        .tool-info {

        .tool-name {

            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tool-name i {
            font-size: 14px;
            color: var(--primary-color);
            opacity: 0;
            transition: all var(--transition-speed) ease;
        }

        .tool-card:hover .tool-name i {
            opacity: 1;
            transform: translateX(3px);
        }

        .tool-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .tool-footer {
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 錯誤/載入狀態提示 */
        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .status-message i {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        /* 頁尾 */
        .footer {
            background-color: var(--white);
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid var(--primary-light);
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 動畫效果定義 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);

        }

        /* 響應式微調 */
        @media (max-width: 600px) {

<body>

    <nav class="navbar" aria-label="主要導覽列">
        <div class="navbar-container">
            <a href="/" class="nav-logo" aria-label="Life Tools 首頁">
                <i class="fa-solid fa-toolbox" aria-hidden="true"></i> Life Tools
            </a>
            <div class="nav-right">
                <a href="/pages/about.html" class="nav-link">關於我們</a>
                <div class="search-box" role="search">
                    <input type="text" id="navSearchInput" class="search-input" placeholder="搜尋工具..." aria-label="搜尋框">
                    <button id="navSearchBtn" class="search-btn" aria-label="確認搜尋">

                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <h1 class="hero-logo">Life Tools</h1>
        <p class="hero-subtitle">讓生活更便利的精緻工具箱，隨手即用</p>
        <div class="hero-search-wrapper" role="search">
            <div class="hero-search-box">
                <input type="text" id="heroSearchInput" class="hero-search-input" placeholder="想要找什麼工具？輸入關鍵字..." aria-label="主頁面搜尋框">
                <button id="heroSearchBtn" class="hero-search-btn" aria-label="執行搜尋">
                    <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                    <span>搜尋</span>
                </button>
            </div>
        </div>

    <main class="tools-section">
        <article class="tools-container-wrapper">
            <h2 class="section-title">工具清單</h2>
            <div class="tools-grid" id="toolsGrid">
                <div class="status-message" id="statusMessage">
                    <i class="fa-solid fa-circle-notch fa-spin" aria-hidden="true"></i>
                    <p>正在加載工具，請稍候...</p>
                </div>
            </div>
        </article>
    </main>

    <footer class="footer">
        &copy; Royal Devotee (NeuralNexusLab X 0xseanlee), all rights reserved.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化搜尋功能與綁定事件
            initSearchEvents();
            // 開始動態獲取設定資料並繪製卡片
            fetchToolsData();
        });

        // 搜尋重導向處理邏輯
        function executeSearch(query) {
            const trimmedQuery = query.trim();
            if (trimmedQuery) {
                // 跳轉至搜尋頁面並帶入查詢參數
                window.location.href = `/pages/search.html?q=${encodeURIComponent(trimmedQuery)}`;
            }
        }

        // 初始化所有搜尋框之鍵盤與點擊事件監聽
        function initSearchEvents() {
            const navInput = document.getElementById('navSearchInput');
            const navBtn = document.getElementById('navSearchBtn');
            const heroInput = document.getElementById('heroSearchInput');
            const heroBtn = document.getElementById('heroSearchBtn');

            // 1. 頂部導覽列搜尋按鈕點擊
            navBtn.addEventListener('click', () => {
                executeSearch(navInput.value);
            });

            // 2. 頂部導覽列搜尋框按下 Enter
            navInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    executeSearch(navInput.value);
                }
            });

            // 3. 主視覺區搜尋按鈕點擊
            heroBtn.addEventListener('click', () => {
                executeSearch(heroInput.value);
            });

            // 4. 主視覺區搜尋框按下 Enter
            heroInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    executeSearch(heroInput.value);
                }
            });
        }

        // 從 metadata.json 動態獲取並渲染工具卡片
        async function fetchToolsData() {
            const toolsGrid = document.getElementById('toolsGrid');
            const statusMessage = document.getElementById('statusMessage');

            try {
                // 發送請求讀取設定檔，防快取邏輯將由 init.js 統一處理
                const response = await fetch('/config/metadata.json');
                
                if (!response.ok) {
                    throw new Error('無法取得工具清單資料');
                }

                const toolsList = await response.json();
                
                // 移除載入狀態訊息
                if (statusMessage) {
                    statusMessage.remove();
                }

                if (toolsList.length === 0) {
                    toolsGrid.innerHTML = `
                        <div class="status-message">
                            <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
                            <p>目前沒有可用的工具</p>
                        </div>
                    `;
                    return;
                }

                // 產生卡片並渲染至畫面
                toolsList.forEach((tool) => {
                    const card = document.createElement('a');
                    card.href = tool.path;
                    card.className = 'tool-card';
                    card.setAttribute('aria-label', `開啟 ${tool.name} 工具`);
                    card.innerHTML = `
                        <div class="tool-info">
                            <h3 class="tool-name">
                                ${escapeHtml(tool.name)}
                                <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                            </h3>
                            <p class="tool-desc">${escapeHtml(tool.description)}</p>
                        </div>
                        <div class="tool-footer">
                            <span>立即使用</span>
                        </div>
                    `;
                    toolsGrid.appendChild(card);
                });

            } catch (error) {
                // 處理連線與解析異常狀態
                console.error('Error fetching tools metadata:', error);
                if (statusMessage) {
                    statusMessage.innerHTML = `
                        <i class="fa-solid fa-triangle-exclamation" style="color: #e74c3c;" aria-hidden="true"></i>
                        <p>載入工具失敗，請稍後再試</p>
                    `;
                }
            }
        }

        // 簡單的 HTML 轉義函式，預防 XSS 注入攻擊
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, (m) => map[m]);
        }
    </script>
