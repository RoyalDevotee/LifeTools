<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬用即時匯率換算器 - Life Tools</title>
    <script src="/scripts/init.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: #FDFBF7; color: #2C3E50; min-height: 100vh; display: flex; flex-direction: column; }
        
        .main-container { padding: 40px 20px; flex-grow: 1; display: flex; justify-content: center; }
        .converter-card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #F5EFEB; border-radius: 12px; outline: none; font-size: 16px; }
        
        .result-box { margin-top: 30px; text-align: center; background: #FFF5EC; padding: 20px; border-radius: 16px; }
        .result-value { font-size: 28px; font-weight: 700; color: #FF8C00; }
        
        .footer { text-align: center; padding: 30px; font-size: 14px; color: #7F8C8D; border-top: 1px solid #FFF5EC; }
    </style>
</head>
<body>
    <main class="main-container">
        <div class="converter-card">
            <h2 style="margin-bottom: 25px;"><i class="fa-solid fa-money-bill-transfer"></i> 即時匯率換算</h2>
            
            <div class="form-group">
                <label>金額</label>
                <input type="number" id="amount" value="1" oninput="convertCurrency()">
            </div>
            
            <div class="form-group">
                <label>從</label>
                <select id="fromCurrency" onchange="convertCurrency()"></select>
            </div>
            
            <div class="form-group">
                <label>換算為</label>
                <select id="toCurrency" onchange="convertCurrency()"></select>
            </div>
            
            <div class="result-box">
                <div class="result-value" id="result">0.00</div>
                <div id="rateInfo" style="font-size: 12px; color: #7F8C8D; margin-top: 5px;"></div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = '1e3e3c98c87d461b10d986ab'; // <-- 記得換成你的 KEY
        const apiBase = `https://v6.exchangerate-api.com/v6/${apiKey}/latest/USD`;

        async function initConverter() {
            const response = await fetch(apiBase);
            const data = await response.json();
            const currencies = Object.keys(data.conversion_rates);
            
            const fromSelect = document.getElementById('fromCurrency');
            const toSelect = document.getElementById('toCurrency');
            
            currencies.forEach(curr => {
                fromSelect.add(new Option(curr, curr));
                toSelect.add(new Option(curr, curr));
            });
            
            fromSelect.value = 'USD';
            toSelect.value = 'TWD';
            convertCurrency();
        }

        async function convertCurrency() {
            const amount = document.getElementById('amount').value;
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            
            const response = await fetch(`https://v6.exchangerate-api.com/v6/${apiKey}/pair/${from}/${to}`);
            const data = await response.json();
            
            const result = (amount * data.conversion_rate).toFixed(2);
            document.getElementById('result').textContent = `${result} ${to}`;
            document.getElementById('rateInfo').textContent = `1 ${from} = ${data.conversion_rate} ${to}`;
        }

        initConverter();
    </script>
</body>
</html>
